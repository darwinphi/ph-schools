name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check if version is already published
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org/ > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is not published yet. Publishing."
          fi

      - name: Publish package
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public --provenance
